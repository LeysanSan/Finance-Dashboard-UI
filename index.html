<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Finance Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-light">

    <div class="container py-4">

        <!-- TITLE -->
        <h1 class="mb-4">Finance Dashboard</h1>

        <!-- ROLE -->
        <div class="mb-3">
            <label class="me-2">Hello,</label>
            <select onchange="changeRole(this.value)" class="form-select w-auto d-inline">
                <option value="user">User</option>
                <option value="admin">Admin</option>
            </select>
        </div>

        <!-- ADD BUTTON -->
        <button id="addBtn" class="btn btn-primary mb-3" onclick="addTransaction()" style="display:none;">
            + Add Transaction
        </button>

        <!-- SUMMARY -->
        <div class="row mb-4" id="summary"></div>

        <div class="row mb-4">

            <!-- Line Chart -->
            <div class="col-md-6">
                <div class="card p-3">
                    <h6>Balance Trend</h6>
                    <canvas id="lineChart"></canvas>
                </div>
            </div>

            <!-- Pie Chart -->
            <div class="col-md-6">
                <div class="card p-3">
                    <h6>Spending by Category</h6>
                    <canvas id="pieChart"></canvas>
                </div>
            </div>

        </div>

        <!-- INSIGHTS BUTTON -->
        <button class="btn btn-info mb-4" onclick="openInsights()">
            View Insights
        </button>
        <div class="mb-3">
            <input type="text" class="form-control" placeholder="Search by category..."
                oninput="handleSearch(this.value)" />
        </div>
        <!-- FILTERS -->
        <div class="mb-3">
            <button class="btn btn-outline-primary me-2" onclick="filterType('all')">All</button>
            <button class="btn btn-outline-success me-2" onclick="filterType('income')">Income</button>
            <button class="btn btn-outline-danger" onclick="filterType('expense')">Expenses</button>
        </div>

        <!-- TRANSACTIONS -->
        <div class="card">
            <div class="card-body">
                <h5>Transactions</h5>
                <div id="transactions"></div>
            </div>
        </div>

    </div>

    <!-- MODAL -->
    <div class="modal fade" id="insightsModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Insights</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body" id="insights">
                    <!-- JS injects here -->
                </div>

            </div>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>

</body>

</html>
